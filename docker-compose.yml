# =============================================================================
# SAMCO Retail Prototype — Docker Compose
#
# Starts the IBM i MCP Server as a containerised HTTP service.
# The server exposes port 3010 which watsonx Orchestrate connects to.
#
# Usage:
#   cp .env.example .env          # fill in your IBM i credentials
#   docker compose up -d          # start server in background
#   docker compose logs -f        # stream logs
#   curl localhost:3010/healthz   # verify server is up
# =============================================================================

services:
  ibmi-mcp-server:
    # Official IBM image — multi-arch (amd64, arm64, ppc64le).
    # Change the tag suffix to match your host architecture:
    #   amd64-v0.3.1  →  standard x86-64 servers / cloud VMs
    #   arm64-v0.3.1  →  Apple Silicon Macs, ARM cloud instances
    #   ppc64le-v0.3.1 → IBM Power Systems (run alongside IBM i)
    image: ghcr.io/ibm/ibmi-mcp-server:amd64-v0.3.1

    container_name: samco-ibmi-mcp-server

    ports:
      - "3010:3010"

    # Load .env (created from .env.example — never committed to git)
    env_file:
      - .env

    volumes:
      # Mount SQL tool definitions into the container (read-only)
      - ./tools:/usr/src/app/tools:ro
      # Mount RSA keys for IBM i HTTP auth (generated by scripts/setup.sh)
      # Comment out this line until you run: scripts/setup.sh --generate-keys
      # - ./secrets:/usr/src/app/secrets:ro

    command:
      - "npx"
      - "ibmi-mcp-server"
      - "--transport"
      - "http"
      - "--tools"
      - "/usr/src/app/tools"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
